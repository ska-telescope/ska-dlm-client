# wrapper/top-level integration stack
include:
- path: ../services.docker-compose.yaml
- path: dlm_services.docker-compose.yaml

services:
  dlm_migration:
    platform: linux/amd64
    image: ${SERVER_IMAGE}
    user: root
    container_name: dlm_migration
    entrypoint: uvicorn ska_dlm.dlm_migration.dlm_migration_requests:rest --host 0.0.0.0 --port 8004
    ports:
      - 8004:8004
    volumes:
      - $PWD/tests/integration/ska-dlm-home:/home/ska-dlm
      - $PWD/tests/integration/ska-dlm-home/.dlm:/root/.dlm
    depends_on:
      dlm_migrations:
        condition: service_completed_successfully
      dlm_postgrest:
        condition: service_started
      dlm_rclone:
        condition: service_started
    networks:
      - dlm_network

  dlm_storage:
    platform: linux/amd64
    image: ${SERVER_IMAGE}
    container_name: dlm_storage
    user: root
    environment:
      SSH_PUBLIC_KEY_PATH: "/dlm/.ssh/id_rsa.pub"
    entrypoint: uvicorn ska_dlm.dlm_storage.dlm_storage_requests:rest --host 0.0.0.0 --port 8003
    ports:
      - 8003:8003
    volumes:
      - shared-tmpfs:/dlm
      - $PWD/tests/integration/ska-dlm-home/.dlm:/root/.dlm
      - $PWD/tests/integration/ska-dlm-home:/home/ska-dlm
    depends_on:
      dlm_migrations:
        condition: service_completed_successfully
      dlm_postgrest:
        condition: service_started
      dlm_rclone:
        condition: service_started
    networks:
      - dlm_network

  dlm_request:
    image: ${SERVER_IMAGE}
    container_name: dlm_request
    user: root
    platform: linux/amd64
    entrypoint: uvicorn ska_dlm.dlm_request.dlm_request_requests:rest --host 0.0.0.0 --port 8002
    ports:
      - 8002:8002
    volumes:
      - $PWD/tests/integration/ska-dlm-home/.dlm:/root/.dlm
      - $PWD/tests/integration/ska-dlm-home:/home/ska-dlm
    depends_on:
      dlm_migrations:
        condition: service_completed_successfully
      dlm_postgrest:
        condition: service_started
      dlm_rclone:
        condition: service_started
    networks:
      - dlm_network

  dlm_ingest:
    platform: linux/amd64
    image: ${SERVER_IMAGE}
    container_name: dlm_ingest
    user: root
    entrypoint: uvicorn ska_dlm.dlm_ingest.dlm_ingest_requests:rest --host 0.0.0.0 --port 8001
    ports:
      - 8001:8001
    volumes:
      - $PWD/tests/integration/ska-dlm-home/.dlm:/root/.dlm
      - $PWD/tests/integration/ska-dlm-home:/home/ska-dlm
    depends_on:
      dlm_migrations:
        condition: service_completed_successfully
      dlm_postgrest:
        condition: service_started
      dlm_rclone:
        condition: service_started
    networks:
      - dlm_network

  dlm_migrations:
    build:
      context: ${DLM_SERVER_REPO_PATH}
      dockerfile: tests/Dockerfile-migrations
    image: dlm_migrations
    container_name: dlm_migrations
    command: >
      --url="jdbc:postgresql://dlm_db:5432/ska_dlm"
      --username="ska_dlm_admin"
      --password="password"
      --driver=org.postgresql.Driver
      --search-path=/changelog
      --changelog-file=changelog.yaml
      update
      --context-filter="create-schema,unprivileged"
    depends_on:
      dlm_db:
        condition: service_healthy
    networks:
      - dlm_network
