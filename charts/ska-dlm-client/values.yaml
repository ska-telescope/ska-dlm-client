# ----------------------------------------------------------------------------------
# Default Helm configuration for ska-dlm-client

# Production users must override the appropriate service endpoints and URLs.
# ----------------------------------------------------------------------------------


# --- Global configuration (shared across components / subcharts) ---
global:
  storageClass: nfss1

# --- Chart metadata / naming ---
system: dlm
subsystem: client
nameOverride: ""
fullnameOverride: ""

# --- External chart/service references ---
ska_dlm:
  fullname: "ska-dlm"

# --- Shared client configuration ---
ska_dlm_client:
  image: artefact.skao.int/ska-dlm-client
  version: "2.0.0"
  imagePullPolicy: Always
  securityContext: {}


# --- Component configurations ---

directory_watcher:
  enabled: true
  component: directory-watcher
  subsystem: data-lifecycle-management
  replicas: 1
  ingest_url: "http://ska-dlm-ingest"
  storage_url: "http://ska-dlm-storage"
  migration_url: "http://ska-dlm-migration"
  source_storage: watch_dir
  storage_root_directory: /dlm/watch_dir
  directory_to_watch: /dlm/watch_dir
  target_name: dlm-archive # default target storage 'dlm-archive' is defined in the DLM Server and always available.
  target_root:
  uid_expiration_days: # leave empty to use DB default, now() + 24:00
  oid_expiration_days: # leave empty to use DB default, 2099-12-31T23:59:59
  use_polling_watcher: false # false means using the iNotify-based watcher, which might not work with networked filesystems.
  skip_rclone_access_check_on_register: false
  register_contents_of_watch_directory: false
  # Kubernetes' internal DNS resolves service names to the correct IP addresses automatically.
  # If these services run in another namespace, use e.g. ska-dlm-ingest.other-namespace:port
  pvc:
    name: shared
    read_only: false

startup_verification: # Test directory_watcher at startup
  enabled: false # Keep false for now because this code hasn't been maintained recently
  component: startup-verification
  subsystem: data-lifecycle-management
  request_url: "http://ska-dlm-request"

configdb_watcher:
  enabled: true
  component: configdb-watcher
  subsystem: data-lifecycle-management
  replicas: 1
  ingest_url: "http://ska-dlm-ingest"
  storage_url: "http://ska-dlm-storage"
  migration_url: "http://ska-dlm-migration"
  include_existing: false
  source_storage: SDPBuffer
  source_root_directory: /dlm/product_dir
  migration_destination_storage_name: dlm-archive  # default target storage 'dlm-archive' is defined in the DLM Server and always available.
  # Kubernetes' internal DNS resolves service names to the correct IP addresses automatically.
  # If these services run in another namespace, use e.g. ska-dlm-ingest.other-namespace:port
  uid_expiration_days: # leave empty to use DB default, now() + 24:00
  oid_expiration_days: # leave empty to use DB default, 2099-12-31T23:59:59
  pvc:
    name: shared
    read_only: false
  sdp_config:
    host:    # <some-external-etcd.namespace.svc.cluster.local>. If empty, default to local etcd Service name
    port: 2379    # default etcd client port
    path: ""      # optional
    etcd:
      enabled: true # deploy a local etcd service
      image: "artefact.skao.int/ska-sdp-etcd"
      tag: "3.5.9"


# --- Auxiliary utility images ---
kubectl: # the kubectl image used for k8s readiness testing
  image: artefact.skao.int/ska-ser-utils
  version: 0.1.0
